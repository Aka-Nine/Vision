<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sample Template (index.html)</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif; background: #070c16; color: #f1f5f9; }
      .wrap { max-width: 960px; margin: 0 auto; padding: 48px 20px; }
      .card { background: #0f1827; border: 1px solid #1e2d45; border-radius: 16px; padding: 24px; }
      h1 { margin: 0 0 10px; font-size: 28px; }
      p { margin: 0; color: #94a3b8; line-height: 1.6; }
      code { background: rgba(59,130,246,0.15); padding: 2px 6px; border-radius: 6px; color: #93c5fd; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Sample template renders real <code>index.html</code></h1>
        <p>
          This is a sanity-check template. If you can see this in the preview server,
          the “serve real index.html when present” path is working.
        </p>
      </div>
    </div>
  </body>
</html>
